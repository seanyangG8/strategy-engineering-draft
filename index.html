<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#262019" />
    <title>Strategy Engineering</title>
    <meta name="description" content="Engineering your success through process improvement, automation & AI, strategy, and sustainability." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Archivo+Black&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" />
    <script>
      // Theme + font bootstrap before hydration to avoid FOUC
      (function () {
        try {
          var t = localStorage.getItem("theme") || "bronze";
          document.documentElement.setAttribute("data-theme", t);
          var f = localStorage.getItem("font") || "editorial";
          document.documentElement.setAttribute("data-font", f);
        } catch (e) {}
      })();
      // GitHub Pages SPA redirect handler — restores deep-link path written by 404.html
      (function () {
        var l = window.location;
        if (l.search && l.search.indexOf("?/") === 1) {
          var decoded = l.search.slice(2).split("&").map(function (s) { return s.replace(/~and~/g, "&"); }).join("?");
          window.history.replaceState(null, "", l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
